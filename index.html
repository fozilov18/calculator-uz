<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0b1c26;
        }

        .calculator {
            padding: 25px;
            border-radius: 25px;
            background: #0f2a36;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .calculator form {
            display: grid;
            grid-template-columns: repeat(4, 70px);
            grid-gap: 12px;
        }

        .value {
            grid-column: span 4;
            height: 80px;
            background: #123240;
            border: 2px solid #1b3f4f;
            outline: none;
            border-radius: 12px;
            text-align: right;
            padding: 15px;
            font-size: 28px;
            color: #1ea7ff;
            margin-bottom: 10px;
        }

        span {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 70px;
            background: #123240;
            color: #fff;
            border-radius: 12px;
            cursor: pointer;
            font-size: 22px;
            transition: 0.15s;
            user-select: none;
        }

        span:hover {
            background: #1e4b5f;
            filter: brightness(1.2);
        }

        span:active {
            transform: scale(0.9);
        }

        .clear {
            grid-column: span 2;
            background: #ff2d7a;
        }

        .operator {
            background: #1b3f4f;
            color: #1ea7ff;
        }

        .plus {
            grid-row: span 2;
            height: 152px;
        }

        .equal {
            background: #1ea7ff;
            color: #fff;
        }
    </style>
</head>
<body>

<div class="calculator">
    <form name="calc">
        <input type="text" class="value" name="txt" readonly>
        
        <span class="clear" onclick="calc.txt.value=''">C</span>
        <span class="operator" onclick="addToDisplay('/')">/</span>
        <span class="operator" onclick="addToDisplay('*')">*</span>
        
        <span onclick="addToDisplay('7')">7</span>
        <span onclick="addToDisplay('8')">8</span>
        <span onclick="addToDisplay('9')">9</span>
        <span class="operator" onclick="addToDisplay('-')">-</span>

        <span onclick="addToDisplay('4')">4</span>
        <span onclick="addToDisplay('5')">5</span>
        <span onclick="addToDisplay('6')">6</span>
        <span class="plus operator" onclick="addToDisplay('+')">+</span>

        <span onclick="addToDisplay('1')">1</span>
        <span onclick="addToDisplay('2')">2</span>
        <span onclick="addToDisplay('3')">3</span>

        <span onclick="addToDisplay('0')">0</span>
        <span onclick="addToDisplay('00')">00</span>
        <span onclick="addToDisplay('.')">.</span>
        <span class="equal" onclick="calculate()">=</span>
    </form>
</div>

<script>
    function addToDisplay(val) {
        document.calc.txt.value += val;
    }

    function calculate() {
        try {
            // Agar displey bo'sh bo'lmasa hisoblaydi
            if(document.calc.txt.value !== "") {
                document.calc.txt.value = eval(document.calc.txt.value);
            }
        } catch (e) {
            document.calc.txt.value = "Xato";
            setTimeout(() => { document.calc.txt.value = "" }, 1000);
        }
    }
</script>

</body>
</html>
